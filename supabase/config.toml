# Supabase local development configuration
# Run: supabase start

[api]
port = 54321
schemas = ["public", "storage"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[studio]
port = 54323
api_url = "http://localhost:54321"

[inbucket]
# Email testing inbox (password reset flows etc.)
port = 54324
smtp_port = 54325
pop3_port = 54326

[storage]
# File size limit for exam assets (audio, images)
file_size_limit = "10MiB"

[auth]
site_url = "http://localhost:5173"
additional_redirect_urls = ["http://localhost:5173"]
jwt_expiry = 3600
enable_signup = false   # accounts provisioned by national admins only

[auth.email]
enable_signup = false
enable_confirmations = false

[realtime]
enabled = true
